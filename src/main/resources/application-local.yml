spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/en_practice
    username: en_practice
    password: en_practice

jwt:
  secret: en-practice-super-secret-key-that-is-at-least-256-bits-long-for-hs256
  expiration: 604800000  # 7 days in ms

firebase:
  config:
    base64: base64-encoded-firebase-service-account-json

openclaw:
  gateway:
    url: http://127.0.0.1:18789
    token: token-for-local-development

tts:
  api-key: api-key-for-local-development
  voice-name: en-US-Neural2-J
  language-code: en-US

stt:
  google:
    enabled: true
    project-id: en-practice
    location: global
    recognizer: _
    language-codes:
      - en-US
    model: latest_long
    interim-results: true
    endpoint: speech.googleapis.com:443
    credentials-base64: base64-encoded-google-service-account-json
    enable-word-time-offsets: true
    enable-word-confidence: true
    pause-threshold-ms: 1000
    low-confidence-threshold: 0.75

backblaze:
  s3:
    endpoint: https://s3.us-west-004.backblazeb2.com
    region: us-west-004
    access-key-id: access-key-id
    secret-access-key: secret-access
    bucket-name: en-practice-bucket
    worker-shared-secret: worker-shared-secret
