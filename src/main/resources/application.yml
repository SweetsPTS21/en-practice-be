server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/en_practice
    username: en_practice
    password: en_practice
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.swpts.enpracticebe.config.WebSocketConfig: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    org.springframework.web.socket.sockjs: DEBUG
    org.springframework.web.socket.handler: DEBUG

cors:
  allowed-origins: http://localhost:5173,http://localhost:5174

firebase:
  config:
    file: firebase-service-account.json
