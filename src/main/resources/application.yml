server:
  port: 8080

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.swpts.enpracticebe.config.WebSocketConfig: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    org.springframework.web.socket.sockjs: DEBUG
    org.springframework.web.socket.handler: DEBUG

cors:
  allowed-origins: http://localhost:5173,https://localhost:5173

tts:
  voice-name: en-US-Neural2-J
  language-code: en-US

stt:
  google:
    enabled: true
    project-id: en-practice
    location: global
    recognizer: _
    language-codes:
      - en-US
    model: latest_long
    interim-results: true
    endpoint: speech.googleapis.com:443
    enable-word-time-offsets: true
    enable-word-confidence: true
    pause-threshold-ms: 1000
    low-confidence-threshold: 0.75
