services:
  postgres:
    image: postgres:17-alpine
    container_name: en_practice_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Postgres tuned for ~2GB RAM server
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c work_mem=4MB
      -c wal_buffers=16MB
      -c max_wal_size=1GB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_compression=on
      -c log_min_duration_statement=1000

    networks:
      - en-practice

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  en-practice-be:
    image: ${DOCKER_HUB_IMAGE}:${APP_VERSION:-latest}
    container_name: en_practice_be
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: prod

      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      # Connection pool (HikariCP) - tuned for 2GB RAM
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 600000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 1800000

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800000}

      # Firebase
      FIREBASE_CONFIG_BASE64: ${FIREBASE_CONFIG_BASE64}

      # OpenClaw gateway
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # TTS
      TTS_API_KEY: ${TTS_API_KEY}
      TTS_VOICE_NAME: ${TTS_VOICE_NAME:-en-US-Neural2-J}
      TTS_LANGUAGE_CODE: ${TTS_LANGUAGE_CODE:-en-US}

      # Backblaze S3
      BACKBLAZE_S3_ENDPOINT: ${BACKBLAZE_S3_ENDPOINT}
      BACKBLAZE_S3_REGION: ${BACKBLAZE_S3_REGION}
      BACKBLAZE_S3_ACCESS_KEY_ID: ${BACKBLAZE_S3_ACCESS_KEY_ID}
      BACKBLAZE_S3_SECRET_ACCESS_KEY: ${BACKBLAZE_S3_SECRET_ACCESS_KEY}
      BACKBLAZE_S3_BUCKET_NAME: ${BACKBLAZE_S3_BUCKET_NAME}
      BACKBLAZE_S3_WORKER_SHARED_SECRET: ${BACKBLAZE_S3_WORKER_SHARED_SECRET}

      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - en-practice
    # Memory limit for app container on 2GB EC2
    deploy:
      resources:
        limits:
          memory: 700m
        reservations:
          memory: 300m

volumes:
  postgres_data:
    driver: local

networks:
  en-practice:
    driver: bridge