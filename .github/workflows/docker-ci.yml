name: Spring Boot Docker CI

on:
  pull_request:
    branches: [develop]
    types: [closed]

jobs:
  docker:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/en-practice-be

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ⚡ Enable Docker layer caching (rất quan trọng với Maven)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏷 Generate tags (latest + commit SHA)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      # 🚀 Build & Push (tối ưu cho Dockerfile multi-stage Maven)
      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # ⚡ Cache cực quan trọng cho Maven dependencies layer
          cache-from: type=gha
          cache-to: type=gha,mode=max

          # ⚡ Tăng tốc build
          build-args: |
            BUILDKIT_INLINE_CACHE=1