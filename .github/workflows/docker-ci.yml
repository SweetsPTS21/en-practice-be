name: Release & Deploy

on:
  push:
    tags:
      - 'v*'   # chỉ trigger khi push tag v1.0.0, v2.1.3,...

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/en-practice-be

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🐳 Setup buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏷 Lấy version từ tag (vd: v1.0.5)
      - name: Extract version
        id: vars
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # 🚀 Build & Push Docker image
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🚀 Deploy lên EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/en-practice

            echo "Updating APP_VERSION to ${{ steps.vars.outputs.VERSION }}"

            # update .env
            sed -i 's/^APP_VERSION=.*/APP_VERSION=${{ steps.vars.outputs.VERSION }}/' .env

            # pull & restart
            docker compose pull
            docker compose up -d

            # cleanup old images (optional)
            docker image prune -f